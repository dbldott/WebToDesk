<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebToDesk.Web</title>
    <base href="/" />

    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        window.wtdSetContent = function (text, isHtml) {
            var el = document.getElementById('richEditor');
            if (!el) return;

            if (isHtml || (text && text.trim().startsWith('<'))) {
                el.innerHTML = text;
            } else {
                el.innerHTML = text
                    ? text.replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/\n/g, '<br>')
                    : '';
            }

            el.focus();
        };

        window.wtdGetContent = function () {
            var el = document.getElementById('richEditor');
            return el ? el.innerHTML : '';
        };

        window.wtdGetPlainText = function () {
            var el = document.getElementById('richEditor');
            if (!el) return '';

            var html = el.innerHTML;
            html = html.replace(/<br\s*\/?>/gi, '\n');
            html = html.replace(/<\/p>/gi, '\n');
            html = html.replace(/<\/div>/gi, '\n');

            var tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        };
    </script>
</body>

</html>
